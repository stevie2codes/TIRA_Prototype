<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIRA</title>
  <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #app {
      height: 100%;
      position: relative;
    }

    forge-scaffold {
      --forge-scaffold-body-background: #ffffff;
      position: relative;
      z-index: 1;
    }

    forge-app-bar {
      --forge-app-bar-theme-background: #3f51b5;
      --forge-app-bar-theme-on-background: #ffffff;
    }

    .home-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 0 16px;
    }

    .home-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 666px;
    }

    .title-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 51px;
      width: 100%;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    .tyler-logo {
      width: 35px;
      height: 35px;
    }

    .title-text {
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 36px;
      line-height: 42px;
      letter-spacing: -0.1px;
      color: rgba(0, 0, 0, 0.87);
      text-align: center;
      white-space: nowrap;
    }

    /* Prompt area */
    .prompt-area {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
    }

    .prompt-input-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      padding: 10px 16px;
      background: white;
      border: 1px solid #e0e0e0;
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .prompt-area:focus-within .prompt-input-row {
      border-color: #3f51b5;
      box-shadow: 0 2px 12px rgba(63, 81, 181, 0.12);
    }

    .prompt-input-row input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      line-height: 22px;
      letter-spacing: 0.25px;
      color: rgba(0, 0, 0, 0.87);
      padding: 8px 0;
      background: transparent;
    }

    .prompt-input-row input::placeholder {
      color: rgba(0, 0, 0, 0.6);
    }

    .prompt-button-row {
      display: flex;
      align-items: center;
      padding: 8px 16px 8px 8px;
      background: white;
      border: 1px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .prompt-area:focus-within .prompt-button-row {
      border-color: #3f51b5;
      box-shadow: 0 2px 12px rgba(63, 81, 181, 0.12);
    }

    .prompt-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .source-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-family: 'Roboto', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.6);
      letter-spacing: 0.25px;
      transition: all 0.15s ease;
    }

    .source-toggle:hover {
      background: #f5f5f5;
      border-color: #bdbdbd;
    }

    .source-toggle forge-icon {
      --forge-icon-font-size: 18px;
    }

    .disclaimer {
      font-family: 'Roboto', sans-serif;
      font-size: 12px;
      line-height: 20px;
      letter-spacing: 0.5px;
      color: rgba(0, 0, 0, 0.6);
      text-align: center;
      padding-top: 4px;
      width: 100%;
    }

    /* ── Suggestions area below input ── */
    .suggestions-row {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-top: 20px;
      width: 100%;
    }

    /* ── Recent activity — top position, card surface ── */
    .recent-section {
      background: #fafafa;
      border: 1px solid #eeeeee;
      border-radius: 12px;
      padding: 4px 0;
      margin-bottom: 16px;
    }

    .recent-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px 4px;
      font-family: 'Roboto', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.35);
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: 'Roboto', sans-serif;
      text-align: left;
      transition: background 0.12s ease;
    }

    .recent-item:first-child {
      border-radius: 8px 8px 0 0;
    }

    .recent-item:last-child {
      border-radius: 0 0 8px 8px;
    }

    .recent-item:hover {
      background: rgba(63, 81, 181, 0.04);
    }

    .recent-item-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #e8e8e8;
      flex-shrink: 0;
    }

    .recent-item-icon forge-icon {
      --forge-icon-font-size: 16px;
      color: rgba(0, 0, 0, 0.4);
    }

    .recent-item-text {
      flex: 1;
      min-width: 0;
    }

    .recent-item-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.8);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 18px;
    }

    .recent-item-meta {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.38);
      line-height: 16px;
    }

    .recent-item-arrow {
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .recent-item-arrow forge-icon {
      --forge-icon-font-size: 16px;
      color: rgba(0, 0, 0, 0.25);
    }

    .recent-item:hover .recent-item-arrow {
      opacity: 1;
    }

    /* ── Suggested actions — full-width interactive rows ── */
    .suggestions-section {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 12px;
    }

    .suggestions-header {
      font-family: 'Roboto', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.35);
      padding: 0 4px 8px;
    }

    .suggestion-actions-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .suggestion-action {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid #e8e8ee;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-family: 'Roboto', sans-serif;
      text-align: left;
      transition: all 0.15s ease;
    }

    .suggestion-action:hover {
      border-color: #c5cae9;
      background: #f7f8ff;
      box-shadow: 0 1px 4px rgba(63, 81, 181, 0.08);
    }

    .suggestion-action-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: #f0f1fa;
      flex-shrink: 0;
    }

    .suggestion-action-icon forge-icon {
      --forge-icon-font-size: 18px;
      color: #3f51b5;
    }

    .suggestion-action-label {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.8);
      letter-spacing: 0.1px;
    }

    .suggestion-action-arrow forge-icon {
      --forge-icon-font-size: 18px;
      color: rgba(0, 0, 0, 0.2);
      transition: color 0.15s ease;
    }

    .suggestion-action:hover .suggestion-action-arrow forge-icon {
      color: #3f51b5;
    }

    /* ── Browse row — categories + library as compact inline chips ── */
    .browse-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .browse-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 30px;
      padding: 0 14px;
      background: transparent;
      border: 1px solid #e0e0e0;
      border-radius: 15px;
      cursor: pointer;
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.25px;
      color: rgba(0, 0, 0, 0.55);
      white-space: nowrap;
      transition: all 0.15s ease;
    }

    .browse-chip forge-icon {
      --forge-icon-font-size: 14px;
      color: rgba(0, 0, 0, 0.35);
      transition: color 0.15s ease;
    }

    .browse-chip:hover {
      background: #f7f8ff;
      border-color: #3f51b5;
      color: #3f51b5;
    }

    .browse-chip:hover forge-icon {
      color: #3f51b5;
    }

    .browse-divider {
      width: 1px;
      height: 18px;
      background: #e0e0e0;
      flex-shrink: 0;
    }

    /* ── Legacy chip styles (used in source-specific views) ── */
    .suggestion-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      padding: 0 18px;
      background: #f7f8ff;
      border: 1px solid #d0d4f7;
      border-radius: 17px;
      cursor: pointer;
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.25px;
      color: #3f51b5;
      text-align: center;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .suggestion-btn:hover {
      background: #eeeffe;
      border-color: #3f51b5;
      box-shadow: 0 1px 4px rgba(63, 81, 181, 0.15);
      transform: translateY(-1px);
    }

    .suggestion-btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    /* Source dropdown */
    .source-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      min-width: 320px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
      z-index: 200;
      overflow: hidden;
      animation: sourceDropIn 0.2s ease;
    }

    @keyframes sourceDropIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .source-dropdown-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 8px;
      font-family: 'Roboto', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.45);
    }

    .source-dropdown-role {
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0.25px;
      font-size: 12px;
      color: #3f51b5;
      background: #f0f1fa;
      padding: 2px 10px;
      border-radius: 12px;
    }

    .source-dropdown-divider {
      height: 1px;
      background: #e8e8e8;
      margin: 4px 12px;
    }

    .source-dropdown-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      text-align: left;
      font-family: 'Roboto', sans-serif;
      transition: background 0.12s ease;
    }

    .source-dropdown-item:hover {
      background: #f5f6fa;
    }

    .source-dropdown-item.active {
      background: #eef0fb;
    }

    .source-dropdown-item forge-icon {
      --forge-icon-font-size: 20px;
      color: rgba(0, 0, 0, 0.4);
      flex-shrink: 0;
    }

    .source-dropdown-item.active forge-icon {
      color: #3f51b5;
    }

    .source-item-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .source-item-label {
      font-size: 14px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.87);
    }

    .source-dropdown-item.active .source-item-label {
      color: #3f51b5;
    }

    .source-item-desc {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.4);
    }

    /* App bar adjustments */
    .app-bar-logo {
      width: 28px;
      height: 28px;
      margin-left: 8px;
    }

    forge-app-bar-search input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 14px;
      padding: 8px;
    }

    /* Side Menu */
    .side-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0);
    }

    .side-menu.open {
      transform: translateX(0);
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.15);
    }

    .side-menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .side-menu-title {
      font-family: 'Roboto', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.87);
      letter-spacing: 0.15px;
    }

    .side-menu-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .side-menu-footer {
      border-top: 1px solid #e0e0e0;
      padding: 8px 0;
      flex-shrink: 0;
    }

    .side-menu-section {
      padding: 8px 0;
    }

    .side-menu-section + .side-menu-section {
      border-top: 1px solid #f0f0f0;
      margin-top: 8px;
      padding-top: 16px;
    }

    .side-menu-section-label {
      font-family: 'Roboto', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.45);
      padding: 8px 24px 4px;
    }

    .side-menu-item {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 12px 24px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.87);
      letter-spacing: 0.25px;
      text-align: left;
      transition: background 0.15s ease;
    }

    .side-menu-item:hover {
      background: rgba(63, 81, 181, 0.08);
    }

    .side-menu-item forge-icon {
      --forge-icon-font-size: 20px;
      color: rgba(0, 0, 0, 0.54);
      flex-shrink: 0;
    }

    .side-menu-item:hover forge-icon {
      color: #3f51b5;
    }

    .side-menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .side-menu-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body class="forge-typography">
  <div id="app">
    <forge-scaffold>
      <forge-app-bar title-text="" slot="header">
        <forge-icon-button slot="start" aria-label="App Switcher" id="app-switcher-btn" style="position: relative;">
          <forge-icon name="grid_view"></forge-icon>
        </forge-icon-button>
        <span slot="start" class="app-bar-title" id="app-bar-title" style="font-size: 16px; font-weight: 500; margin-left: 4px; cursor: default;">TIRA</span>
        <forge-app-bar-menu-button slot="start" id="menu-toggle-btn"></forge-app-bar-menu-button>
        <img slot="start" class="app-bar-logo" src="/images/tyler-logo-icon.png" alt="Tyler Logo" />
        <forge-app-bar-search slot="center">
          <input type="text" placeholder="Search" />
        </forge-app-bar-search>
        <forge-icon-button slot="end" aria-label="Ask AI" id="sparkle-btn" style="display: none;">
          <forge-icon name="auto_awesome"></forge-icon>
        </forge-icon-button>
        <forge-icon-button slot="end" aria-label="Help">
          <forge-icon name="help_outline"></forge-icon>
        </forge-icon-button>
        <forge-icon-button slot="end" aria-label="Notifications">
          <forge-icon name="notifications"></forge-icon>
        </forge-icon-button>
        <forge-button variant="text" slot="end" style="--forge-button-color: white;">
          <button type="button">Sign In</button>
        </forge-button>
        <forge-avatar slot="end" text="TF" style="margin-right: 8px;"></forge-avatar>
      </forge-app-bar>

      <div slot="body" id="view-container" style="height: 100%;"></div>
    </forge-scaffold>
  </div>
  <script type="module" src="/src/main.js"></script>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</body>
</html>
